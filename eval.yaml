version: "1"
skill: .

defaults:
  agent: claude
  provider: docker
  trials: 5
  timeout: 600
  docker:
    base: node:20-bookworm
    # skillgrade always runs `claude --dangerously-skip-permissions` inside the
    # container, which refuses to run as root — so we drop to the `node` user
    # (built into the node:20 base image) at the end of setup. `chown`/`USER`
    # are on their own trailing lines (not chained with `&&`) so tweaking them
    # doesn't bust the cache for the slow Go/golangci-lint install above: this
    # string becomes multiple Dockerfile lines, only the first of which gets
    # skillgrade's automatic `RUN ` prefix — subsequent lines are raw
    # Dockerfile instructions, which is how the bare `USER node` becomes a
    # real USER directive instead of shell text.
    setup: |
      apt-get update && apt-get install -y git curl && GOVER=$(curl -fsSL https://go.dev/VERSION?m=text | head -1) && ARCH=$(dpkg --print-architecture) && curl -fsSL "https://go.dev/dl/${GOVER}.linux-${ARCH}.tar.gz" -o /tmp/go.tgz && tar -C /usr/local -xzf /tmp/go.tgz && ln -s /usr/local/go/bin/go /usr/local/bin/go && ln -s /usr/local/go/bin/gofmt /usr/local/bin/gofmt && GOBIN=/usr/local/bin /usr/local/go/bin/go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      RUN chown node:node /workspace
      USER node

tasks:
  - name: catches-issues
    instruction: |
      This workspace contains a git bundle at fixture.bundle with two
      branches: main and feature. feature has one commit ahead of main,
      already made and committed for you.

      Run:
        git clone fixture.bundle work && cd work

      Then follow this skill's (GoSkill) development loop as documented in
      SKILL.md: copy .golangci.yml and .claude/agents/go-reviewer.md from
      the skill root (one directory above `work`) into `work` and
      `work/.claude/agents` respectively, then invoke the go-reviewer
      subagent against the diff between main and feature
      (`git diff main...feature`) to review the feature branch's change
      before it would be merged.

      Write the go-reviewer subagent's full findings verbatim to
      review-output.txt at the top level of this workspace (a sibling of
      `work`, not inside it). Do not fix any issues yourself — only
      produce the review.

    workspace:
      - src: fixtures/catches-issues/fixture.bundle
        dest: fixture.bundle

    graders:
      - type: deterministic
        run: bash graders/check-catches-issues.sh
        weight: 1.0
